<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Ignite Insights — Email Digest</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
       background: #f1f5f9; color: #1e293b; }

.nav-bar { background: #0f172a; padding: .75rem 2rem; }
.nav-bar a { color: #38bdf8; text-decoration: none; font-size: .9rem; }
.nav-bar a:hover { text-decoration: underline; }

.email-header { background: #1e293b; color: #f8fafc; padding: 1.5rem 2rem; }
.email-header h1 { font-size: 1.3rem; font-weight: 700; line-height: 1.4; margin-bottom: .6rem; }
.email-meta { font-size: .85rem; color: #94a3b8; display: flex; gap: 1.5rem; flex-wrap: wrap; }

.email-body { max-width: 860px; margin: 1.5rem auto; padding: 0 1.5rem 3rem; }

iframe.email-frame {
  width: 100%; min-height: 400px; border: none;
  background: #fff; border-radius: 8px;
  box-shadow: 0 1px 3px rgba(0,0,0,.1);
}

pre.email-text {
  background: #fff; border-radius: 8px; padding: 1.5rem;
  font-size: .875rem; line-height: 1.7;
  white-space: pre-wrap; word-break: break-word;
  box-shadow: 0 1px 3px rgba(0,0,0,.1);
}

@media (max-width: 600px) { .email-header { padding: 1rem; } .email-body { padding: 0 1rem 2rem; } }
</style>
</head>
<body>
  <div class="nav-bar">
    <a href="../index.html">← Back to digest</a>
  </div>
  <div class="email-header">
    <h1>Welcome to Ignite Insights</h1>
    <div class="email-meta">
      <span>From: Ignite Insights &lt;igniteinsights@substack.com&gt;</span>
      <span>Apr 25, 2026</span>
      <span>Label: Ignites</span>
    </div>
  </div>
  <div class="email-body">
    <pre class="email-text">Thank you for subscribing to Ignite Insights! You are now subscribed and will receive updates from Ignite Insights.</pre>
  </div>
</body>
</html>
